<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranspoBot — Assistant IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">🚌 TranspoBot</div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="vehicules.html" class="nav-link">Véhicules</a>
    <a href="chauffeurs.html" class="nav-link">Chauffeurs</a>
    <a href="trajets.html" class="nav-link">Trajets</a>
    <a href="chat.html" class="nav-link active highlight">💬 Assistant IA</a>
  </div>
</nav>

<main class="container">
  <h1 class="page-title">Assistant IA TranspoBot</h1>

  <div class="chat-wrapper">
    <div class="suggestions">
      <span class="sug-label">Exemples :</span>
      <button class="sug-btn" onclick="ask(this.textContent)">Combien de trajets cette semaine ?</button>
      <button class="sug-btn" onclick="ask(this.textContent)">Quel chauffeur a le plus d'incidents ?</button>
      <button class="sug-btn" onclick="ask(this.textContent)">Véhicules en maintenance ?</button>
      <button class="sug-btn" onclick="ask(this.textContent)">Combien de chauffeurs actifs ?</button>
      <button class="sug-btn" onclick="ask(this.textContent)">Total passagers cette semaine ?</button>
    </div>

    <div id="chat-box">
      <div class="welcome">
        <div class="welcome-icon">🤖</div>
        <p>Bonjour ! Je suis TranspoBot, votre assistant IA.<br>Posez-moi une question sur vos données de transport.</p>
      </div>
    </div>

    <div class="chat-footer">
      <div class="input-row">
        <input id="question" type="text" class="chat-input"
               placeholder="Ex: Combien de trajets cette semaine ?"
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="footer-note">Les requêtes sont uniquement en lecture (SELECT). Vos données sont protégées.</p>
    </div>
  </div>
</main>

<script>
const API = 'https://new-transport-urbain-production.up.railway.app/api/chat';

function ask(q) {
  document.getElementById('question').value = q;
  sendMessage();
}

function addMsg(role, html) {
  const box = document.getElementById('chat-box');
  const welcome = box.querySelector('.welcome');
  if (welcome) welcome.remove();
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = html;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

function buildTable(data) {
  if (!data || data.length === 0) return '<p class="no-result">Aucun résultat trouvé.</p>';
  const cols = Object.keys(data[0]);
  return `<div class="result-table-wrap"><table class="result-table">
    <tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>
    ${data.map(row=>`<tr>${cols.map(c=>`<td>${row[c]??'—'}</td>`).join('')}</tr>`).join('')}
  </table></div>`;
}

async function sendMessage() {
  const input = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;

  addMsg('user', `<span>${question}</span>`);
  input.value = '';
  const botDiv = addMsg('bot', '<span class="typing"><span></span><span></span><span></span></span>');

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question})
    });
    const data = await res.json();

    const sqlBlock = data.sql
      ? `<details class="sql-details"><summary>🔍 Voir la requête SQL générée</summary><pre class="sql-pre">${data.sql}</pre></details>`
      : '';
    const table = data.resultats?.length > 0 ? buildTable(data.resultats) : '';
    const count = data.nb > 0 ? `<span class="result-count">${data.nb} résultat(s)</span>` : '';

    botDiv.innerHTML = `
      <div class="bot-header">🤖 TranspoBot</div>
      <p class="bot-text">${data.reponse}</p>
      ${count}
      ${table}
      ${sqlBlock}
    `;
  } catch(err) {
    botDiv.innerHTML = `<p class="error-msg">❌ Erreur de connexion au serveur.</p>`;
  }
}
</script>
</body>
</html>
